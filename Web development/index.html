<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="script" href="script.js">
    <style>
        .box{
            border: 2px solid red;
            height: 100px;
            width: 100px;
            margin: 10px;
            top: 100px;
            bottom: 100px;
        }

        .b1{
            background-color: rgb(92, 133, 92);
            left:110px;
            position: relative;
        }

        .b2{
            background-color: rgb(113, 113, 218);
            position: absolute;
            top: 10px;
        }

        .b3{
            background-color: rgb(186, 248, 92);
            position: relative;
            top: 50px;
        }

        #container{
            border: 2px solid black;
            position: relative;
        }

        .one{
            height: 100px;
            width: 100px;
            background-color: violet;
            position: absolute;
        }

        h1{
            position: relative;
            top: 20px;
            position: fixed;
        }
/* position: sticky bhot absolute as well as relative 
position: sticky
top: 100px;
left: 100px
and the parent has;*/
        body{
            position: relative;
        }
    </style>
</head>

<body>
    <h1>Position</h1>
    <div id="container">
        <div class="box b1">Box 1</div>
        <div class="box b2">Box 2</div>
        <div class="box b3">Box 3</div>
    </div>

    <h1>Hi</h1>

    <div class="one"></div>
</body>
</html>
