<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <style>

      body {
        text-align: center;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      #result {
        color: rgb(52, 52, 210);
        margin-top: 20px;
        font-size: 40px;
      }

    </style>
  </head>
  <body>
    <div id="margin">
    <h1 id="id" style="color: rgb(6, 78, 54);">Random Number Generator</h1>
    <button onclick="generateNumber()" style="cursor: pointer; background-color: pink; border: 2px solid rgb(190, 187, 187); border-radius: 5px; color: white; font-size: 20px;">Generate Number</button>
    <div id="result">0</div>
    </div>
  </body>
  <script>
    function generateNumber(){
        random = Math.floor(Math.random()*100) + 1
        let target = document.getElementById("result")
        target.innerText = random;
    }
  </script>
</html>
