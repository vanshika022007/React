<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <style>
        .parent{
            height: 422px;
            width: 422px;
            background-color: blanchedalmond;
            display: flex;
            /* flex-direction: column; */
            justify-content: space-evenly;
            align-items: center;
            /* flex-wrap: wrap-reverse; */
        }

        .div{
            height: 100px;
            width: 100px;
            border: 3px solid plum;
            border-radius: 10px;
        }

        .d1{
            background-color: lightpink;
            flex-grow: 0.5;
        }

        .d2{
            background-color: rgb(7, 203, 95);
            flex-grow: 0.75;
        }

        .d3{
            background-color: rgb(86, 11, 237);
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="div d1"></div>
        <div class="div d2"></div>
        <div class="div d3"></div>
        
    </div>
</body>
</html>
